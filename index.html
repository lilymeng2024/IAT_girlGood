    var targets = [
        {stimulus:'img/A_G_3_S_006.png', category:'girl', type:'picture'},
        {stimulus:'img/B_G_3_S_002.png', category:'girl', type:'picture'},
        {stimulus:'img/l_g_3_s_009.png', category:'girl', type:'picture'},
        {stimulus:'img/W_G_3_S_003.png', category:'girl', type:'picture'},
        {stimulus:'img/A_B_3_S_004.png', category:'boy', type:'picture'},
        {stimulus:'img/B_B_3_S_008.png', category:'boy', type:'picture'},
        {stimulus:'img/l_b_3_s_010.png', category:'boy', type:'picture'},
        {stimulus:'img/W_B_3_S_002.png', category:'boy', type:'picture'}
    ];
    var attributes = [
        {stimulus:'img/miracle.jpg', category:'GOOD', type:'word'},
        {stimulus:'img/lucky.jpg', category:'GOOD', type:'word'},
        {stimulus:'img/laughter.jpg', category:'GOOD', type:'word'},
        {stimulus:'img/gift.jpg', category:'GOOD', type:'word'},
        {stimulus:'img/ugly.jpg', category:'BAD', type:'word'},
        {stimulus:'img/tragedy.jpg', category:'BAD', type:'word'},
        {stimulus:'img/grief.jpg', category:'BAD', type:'word'},
        {stimulus:'img/hatred.jpg', category:'BAD', type:'word'}
    ];

    //Generic IAT trial template
    var iat_trial = {
        type: jsPsychIatImage,
        stimulus: jsPsych.timelineVariable('stimulus'),
        stimulus_category: jsPsych.timelineVariable('category'),
        stimulus_duration: null,
        post_trial_gap: 250,

        left_category_key: 'e',
        right_category_key: 'i',
        
        left_category_label: jsPsych.timelineVariable('left_label'),
        right_category_label: jsPsych.timelineVariable('right_label'),
        stim_key_association: jsPsych.timelineVariable('correct_side'),
        
        html_when_wrong: '<span style="color:red;font-size:80px">X</span>',
        display_feedback: true,
        force_correct_key_press: true,
        response_ends_trial: true,
        
        data:{
            block: jsPsych.timelineVariable('block'),
            category: jsPsych.timelineVariable('category'),
            stim_type: jsPsych.timelineVariable('stim_type')
        }
    };

    //Helper function to create blocks
    function createIATBlock(stimuli, left_labels, right_labels, block_number, repetitions){

        function shuffleNoRepeat(stimuli, previous_order){
            var shuffled;
            do{
                shuffled = jsPsych.randomization.shuffle(stimuli.slice());
            } while(
                previous_order && 
                JSON.stringify(shuffled.map(s=>s.stimulus)) === 
                JSON.stringify(previous_order.map(s=>s.stimulus))
            );
            return shuffled;
        }

        var vars = [];
        var previous_shuffle = null;
        for(let r=0; r<repetitions; r++){
            var shuffled = shuffleNoRepeat(stimuli, previous_shuffle);
            previous_shuffle = shuffled;
            shuffled.forEach(function(stim){

                var side;

                if(left_labels.includes(stim.category)){
                    side = "left";
                }else{
                    side = "right";
                }

                vars.push({
                    stimulus: stim.stimulus,
                    category: stim.category,
                    correct_side: side,
                    left_label: left_labels,
                    right_label: right_labels,
                    block: block_number,
                    stim_type: stim.type
                });
            });
        }
        
        return {
            timeline:[iat_trial],
            timeline_variables: vars,
            randomize_order:true
        };
    }

    function createAlternatingMixedBlock(pictures, words, left_labels, right_labels, block_number, repetitions){

        function shuffleNoRepeat(stimuli, previous_order){
            var shuffled;
            do{
                shuffled = jsPsych.randomization.shuffle(stimuli.slice());
            } while(
                previous_order && 
                JSON.stringify(shuffled.map(s=>s.stimulus)) === 
                JSON.stringify(previous_order.map(s=>s.stimulus))
            );
            return shuffled;
        }

        var vars = [];
        var prev_pic_shuffle = null;
        var prev_word_shuffle = null;
        for(let r=0; r<repetitions; r++){
            var pic = shuffleNoRepeat(pictures, prev_pic_shuffle);
            var wrd = shuffleNoRepeat(words, prev_word_shuffle);
            prev_pic_shuffle = pic;
            prev_word_shuffle = wrd;
            var max_trials = Math.min(pic.length, wrd.length) * 2;
            for(let i=0;i<max_trials;i++){
                var stim;
                //odd trials:picture
                if(i % 2 == 0){
                    stim = pic.pop();
                }
                //even trials:word
                else{
                    stim = wrd.pop();
                }

            var side;
            
            if(left_labels.includes(stim.category)){
                side = "left";
            }else{
                side = "right";
            }
            
            vars.push({
                stimulus: stim.stimulus,
                category: stim.category,
                correct_side: side,
                left_label: left_labels,
                right_label: right_labels,
                block: block_number,
                stim_type: stim.type
            });
        }
    }

    return {
        timeline:[iat_trial],
        timeline_variables: vars,
        randomize_order:false
        };
    };
    
    //feedback function
    function blockFeedback(block_num){
        return {
            type: jsPsychHtmlKeyboardResponse,
            stimulus: function(){
                // Get only trials from this block
                var data = jsPsych.data.get().filter({block: block_num});

                // Remove trials with no RT (just in case)
                var valid = data.filter(function(d){
                    return d.rt !== null;
                });

                // Average RT
                var avg_rt = Math.round(valid.select('rt').mean());

                // Error rate
                var total = valid.count();
                var errors = valid.filter({correct: false}).count();
                var error_rate = total > 0 ? Math.round((errors / total) * 100) : 0;

                return `
                    <div style="text-align:center;">
                        <p>Some feedback about your performance.
                        <p><b>Average Response Time:</b> ${avg_rt} ms</p>
                        <p><b>Error Rate:</b> ${error_rate}%</p>
                        <p>Ready for the next block? Press space bar to continue.</p>
                    </div>
                `;
            },
            choices: [' ']
        };
    }

    timeline.push(blockFeedback(6));
